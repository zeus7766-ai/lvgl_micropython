name: ESP32-C3 LVGL Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-esp32:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Build ESP32-C3 with ILI9341
      run: |
        python make.py esp32 \
          BOARD=ESP32_GENERIC_C3 \
          DISPLAY=ili9341 \
          --flash-size=4
    
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: esp32-c3-lvgl-firmware
        path: build/lvgl_micropy_*.bin
